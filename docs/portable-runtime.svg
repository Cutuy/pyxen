<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" font-family="SF Mono, Monaco, Consolas, monospace" font-size="13">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#666"/>
    </marker>
  </defs>

  <!-- APPLICATION -->
  <rect x="40" y="10" width="560" height="80" rx="6" fill="#1a1a2e" stroke="#4cc9f0" stroke-width="2"/>
  <text x="60" y="35" fill="#4cc9f0" font-weight="bold" font-size="14">APPLICATION</text>
  <text x="60" y="55" fill="#888" font-size="12">CLI · web · pipeline · w/ or w/o agents</text>
  <text x="60" y="75" fill="#aaa" font-size="12">rt = await Runtime.load(&quot;runtime.json&quot;)</text>

  <line x1="320" y1="90" x2="320" y2="120" stroke="#666" stroke-width="2" marker-end="url(#a)"/>

  <!-- PORTABLE RUNTIME -->
  <rect x="40" y="120" width="560" height="80" rx="6" fill="#1a1a2e" stroke="#f72585" stroke-width="2"/>
  <text x="60" y="145" fill="#f72585" font-weight="bold" font-size="14">PORTABLE RUNTIME — 7 primitives</text>
  <text x="60" y="165" fill="#aaa" font-size="12">identity · tokens · ipc · pkg · storage · secrets · observe</text>
  <text x="60" y="185" fill="#666" font-size="11">runtime.json maps primitives → providers</text>

  <line x1="320" y1="200" x2="320" y2="230" stroke="#666" stroke-width="2" marker-end="url(#a)"/>

  <!-- IMPL LAYER -->
  <rect x="40" y="230" width="560" height="80" rx="6" fill="#1a1a2e" stroke="#7209b7" stroke-width="2"/>
  <text x="60" y="255" fill="#7209b7" font-weight="bold" font-size="14">IMPL LAYER</text>
  <text x="60" y="275" fill="#aaa" font-size="12">per-primitive impls (sqlite, keychain, pip, openai_handoffs, otel, …)</text>

  <line x1="320" y1="310" x2="320" y2="340" stroke="#666" stroke-width="2" marker-end="url(#a)"/>

  <!-- RAW ENVIRONMENT -->
  <rect x="40" y="340" width="560" height="80" rx="6" fill="#1a1a2e" stroke="#4361ee" stroke-width="2"/>
  <text x="60" y="365" fill="#4361ee" font-weight="bold" font-size="14">RAW ENVIRONMENT</text>
  <text x="60" y="385" fill="#aaa" font-size="12">the machine, the cloud, the OS</text>
</svg>
